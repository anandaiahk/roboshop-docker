services:
  catalogue:
    build: ./catalogue
    image: anandkoppala/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  user:
    build: ./user
    image: anandkoppala/user:1.0.0
    container_name: user
    depends_on:
    - redis 
    - mongodb 
  
  cart:
    build: ./cart
    image: anandkoppala/cart:1.0.0
    container_name: cart
    depends_on:
    - redis  
    - catalogue

  shipping:
    build: ./shipping
    image: anandkoppala/shipping:1.0.0
    container_name: shipping
    depends_on:
    - mysql
    - cart
  
  
  payment:
    build: ./payment
    image: anandkoppala/payment:1.0.0
    container_name: payment
    environment:
      CART_HOST: "cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_USER: "roboshop"
      AMQP_PASS: "roboshop123"
    depends_on:
    - rabbitmq
    - cart
    - user


  mongodb:
    build: ./mongodb # it moves to mongodb directory
    image: anandkoppala/mongodb:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: mongodb

  redis:
    image: redis:7.0
    container_name: redis  

  mysql:
    build: ./mysql # it moves to mongodb directory
    image: anandkoppala/mysql:1.0.0 # docker build -t joindevops/mongodb:1.0.0
    container_name: mysql
  
  rabbitmq:
    image: rabbitmq:3
    environment: 
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq
      
  

  frontend:
    build: ./frontend
    image: anandkoppala/frontend:1.0.0
    container_name: frontend
    ports:
    - "80:80"
    depends_on:
    - catalogue
    - user
    - cart
    - shipping
    - payment


networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually
